<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050805">
  <title>DIGITBOX MCVM — browser Minecraft sandbox terminal</title>
  <meta name="description" content="A sandboxed terminal VM that runs real Minecraft Java in your browser via a WebAssembly JVM. Nothing is saved. Not an official Minecraft product.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23050805'/%3E%3Ctext x='2' y='12' font-family='monospace' font-size='11' fill='%2344ff77'%3E%26gt;_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <noscript>
    <div class="noscript">DIGITBOX MCVM requires JavaScript — it boots a WebAssembly JVM in your browser.</div>
  </noscript>

  <!-- CRT terminal -->
  <div id="crt">
    <div id="terminal" aria-live="polite">
      <div id="scrollback"></div>
      <div id="inputline" hidden>
        <span id="ps1">guest@digitbox:~$&nbsp;</span><span id="inputecho"></span><span id="cursor">█</span>
      </div>
    </div>
    <div id="chips" hidden>
      <button data-cmd="help">help</button>
      <button data-cmd="versions">versions</button>
      <button data-cmd="launch 1.2.5">launch 1.2.5</button>
      <button data-cmd="mods add">mods add</button>
      <button data-cmd="sandbox">sandbox</button>
      <button data-cmd="sysinfo">sysinfo</button>
    </div>
    <input id="kbd" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="terminal input">
  </div>

  <!-- Game video output -->
  <div id="gamepanel" hidden>
    <div id="gamebar">
      <span id="gametitle">MCVM ▸ —</span>
      <span class="grow"></span>
      <button id="btn-keys" title="On-screen keys (touch)">⌨ KEYS</button>
      <button id="btn-fs" title="Fullscreen">⛶ FULL</button>
      <button id="btn-power" title="Power off wipes the sandbox and reboots the terminal">⏻ POWER</button>
    </div>
    <div id="display"></div>
    <div id="touchkeys" hidden>
      <div class="tk-row"><button data-key="KeyW">W</button></div>
      <div class="tk-row">
        <button data-key="KeyA">A</button>
        <button data-key="KeyS">S</button>
        <button data-key="KeyD">D</button>
      </div>
      <div class="tk-row wide">
        <button data-key="Space">JUMP</button>
        <button data-key="ShiftLeft">SNEAK</button>
        <button data-key="KeyE">INV</button>
        <button data-key="Escape">ESC</button>
      </div>
    </div>
  </div>

  <input id="filepick" type="file" accept=".jar,.zip" multiple hidden>

  <script type="module" src="js/main.js"></script>
</body>
</html>
